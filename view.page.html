<ion-header>
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-back-button text="" icon="chevron-back-circle-outline"></ion-back-button>
    </ion-buttons>
    <ion-button slot="end" routerLink="/contact">
      <ion-icon name="person-add" slot="end"></ion-icon>
      </ion-button>
    <ion-title class="ion-text-center">Contacts&nbsp;&nbsp;</ion-title>
  </ion-toolbar>
</ion-header>


<ion-content padding class=bg>
  <br>
<ion-card class="try">
  <ion-list lines="none">
    <ion-item-sliding *ngFor="let contact of contacts">
    <ion-item class="no-padding">
      <ion-label>
          <h2>{{ contact.name}}</h2>
          <p>{{ contact.number }}</p>
      </ion-label>
    </ion-item>
  
    <ion-item-options side="start">
      <ion-item-option color="primary" [routerLink]="['/edit', contact.id]">
        <ion-icon slot="icon-only" name="pencil-outline"></ion-icon>
      </ion-item-option>
    </ion-item-options>

    <ion-item-options side="end">
      <ion-item-option color="danger" (click)="deleteContact(contact.id)">
        <ion-icon slot="icon-only" name="trash"></ion-icon>
      </ion-item-option>
    </ion-item-options>
  </ion-item-sliding>
</ion-list>
</ion-card>
</ion-content>
